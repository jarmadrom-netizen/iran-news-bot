name: iran-news-bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iran-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Одна проверка новостей
        env:
          IRAN_BOT_TOKEN: ${{ secrets.IRAN_BOT_TOKEN }}
          IRAN_BOT_CHAT: ${{ secrets.IRAN_BOT_CHAT }}
        run: python3 iran_news_bot.py --once

      - name: Сохранить память обратно в репозиторий
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "iran-bot"
            git config user.email "iran-bot@users.noreply.github.com"
            git add seen.json
            git commit -m "update news memory [skip ci]"
            git pull --rebase --autostash || true
            git push || true
          fi
